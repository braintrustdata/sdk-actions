# GENERATED by scripts/generate.rb — edit templates/, not this file.
name: Validate Python Release
description: >
  Checks out the release SHA, sets up uv and Python, reads the package
  version, validates the release metadata (tag existence, branch, commit
  metadata) and that the version is not already on PyPI, then builds to confirm
  the package is publishable before the approval gate.

inputs:
  sha:
    description: "Commit SHA being released"
    required: true
  dry_run:
    description: "Skip tag existence failure in dry runs"
    required: false
    default: 'false'
  version:
    description: >
      Explicit version override. If provided, the version is not read from
      version_file. Use when the version is computed externally (e.g. bt-publishing-test
      auto-bump, or an ephemeral prerelease).
    required: false
    default: ''
  version_file:
    description: >
      Path (repo-root-relative) to a Python module exposing VERSION (e.g.
      py/pkg/version.py). Read when version is not overridden.
    required: false
    default: ''
  working_directory:
    description: "Path to the package root (where pyproject.toml lives)"
    required: false
    default: '.'
  python_version:
    description: >
      Python version (e.g. 3.13), or a path to a version file
      (.python-version, .tool-versions) relative to the repo root.
    required: true
  package_name:
    description: >
      PyPI package name (matches the publish action's input). When set, validate
      fails fast if this version is already published (covers prereleases, which
      aren't git-tagged). Leave empty to skip.
    required: false
    default: ''
  tag_format:
    description: "Git tag format, with a {version} placeholder (e.g. py-{version})"
    required: false
    default: 'py-{version}'
  build_command:
    description: "Override build command. When empty, `uv build` is used."
    required: false
    default: ''
outputs:
  release_tag:
    description: "The release tag (e.g. py-0.3.2)"
    value: ${{ steps.validate.outputs.release_tag }}
  prev_release:
    description: "The previous release tag"
    value: ${{ steps.validate.outputs.prev_release }}
  branch:
    description: "The branch containing the SHA"
    value: ${{ steps.validate.outputs.branch }}
  on_release_branch:
    description: "Whether the SHA is on an expected release branch"
    value: ${{ steps.validate.outputs.on_release_branch }}
  commit_message:
    description: "The commit message at the SHA"
    value: ${{ steps.validate.outputs.commit_message }}
  version:
    description: "The resolved package version"
    value: ${{ steps.read-version.outputs.version }}

runs:
  using: composite
  steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ inputs.sha }}
        fetch-depth: 0

    - name: Resolve Python version source
      id: py-src
      shell: bash
      env:
        PYTHON_VERSION: ${{ inputs.python_version }}
      run: |
        # python_version is either an explicit version (e.g. 3.13) or a path to a
        # version file (.python-version / .tool-versions). Route by file existence.
        if [ -n "$PYTHON_VERSION" ] && [ -f "$PYTHON_VERSION" ]; then
          case "$PYTHON_VERSION" in
            *.tool-versions) SPEC=$(awk '/^python /{print $2; exit}' "$PYTHON_VERSION") ;;
            *)               SPEC=$(head -1 "$PYTHON_VERSION" | tr -d '[:space:]') ;;
          esac
        else
          SPEC="$PYTHON_VERSION"
        fi
        echo "spec=$SPEC" >> "$GITHUB_OUTPUT"

    - name: Set up uv
      uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7.2.0
      with:
        # Installs this Python and exports UV_PYTHON for the job, so subsequent uv
        # commands (build, read-version) use it.
        python-version: ${{ steps.py-src.outputs.spec }}

    - name: Read version
      id: read-version
      shell: bash
      env:
        VERSION_OVERRIDE: ${{ inputs.version }}
        VERSION_FILE: ${{ inputs.version_file }}
      run: |
        if [ -n "$VERSION_OVERRIDE" ]; then
          VERSION="$VERSION_OVERRIDE"
        else
          # exec the version file in an isolated namespace (no package import needed),
          # matching how the SDKs expose VERSION in a standalone version.py.
          VERSION=$(uv run --no-project python -c "import runpy,sys; print(runpy.run_path(sys.argv[1])['VERSION'])" "$VERSION_FILE")
        fi
        if [ -z "$VERSION" ] || [ "$VERSION" = "None" ]; then
          echo "::error title=Could not read version::resolved an empty version — check VERSION in $VERSION_FILE (or pass a version override)."
          exit 1
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Check PyPI version availability
      shell: bash
      env:
        PACKAGE_NAME: ${{ inputs.package_name }}
        VERSION: ${{ steps.read-version.outputs.version }}
      run: |
        if [ -z "$PACKAGE_NAME" ]; then
          echo "No package_name provided; skipping PyPI availability check."
          exit 0
        fi
        CODE=$(curl -sS -o /dev/null -w '%{http_code}' \
          --retry 3 --retry-connrefused --max-time 30 \
          "https://pypi.org/pypi/$PACKAGE_NAME/$VERSION/json")
        case "$CODE" in
          200)
            echo "::error title=Version already published::$PACKAGE_NAME $VERSION already exists on PyPI — has the version been bumped?"
            exit 1
            ;;
          404)
            echo "$PACKAGE_NAME $VERSION is available on PyPI."
            ;;
          *)
            echo "::error title=Registry check failed::unexpected response from PyPI (HTTP $CODE) checking $PACKAGE_NAME $VERSION — cannot confirm the version is unpublished; aborting rather than risk a bad release."
            exit 1
            ;;
        esac

    - name: Validate SHA format
      shell: bash
      env:
        SHA: ${{ inputs.sha }}
      run: |
        if ! echo "$SHA" | grep -qE '^[0-9a-f]{40}$'; then
          echo "::error title=Invalid release SHA::sha must be a full 40-character commit SHA — branch names and short SHAs are not accepted."
          exit 1
        fi

    - name: Validate release
      id: validate
      shell: bash
      env:
        VERSION: ${{ steps.read-version.outputs.version }}
        TAG_FORMAT: ${{ inputs.tag_format }}
        DRY_RUN: ${{ inputs.dry_run }}
        RELEASE_BRANCH: 'main'
        SHA: ${{ inputs.sha }}
      run: |
        TAG="${TAG_FORMAT//\{version\}/$VERSION}"
        COMMIT_MSG=$(git log -1 --format="%s" HEAD)
        BRANCH=$(git branch -r --contains HEAD --format="%(refname:short)" | sed 's|origin/||' | head -1)

        if git rev-parse "$TAG" >/dev/null 2>&1; then
          if [ "$DRY_RUN" = "true" ]; then
            echo "::warning title=Release tag already exists::Tag $TAG already exists — skipping in dry run."
          else
            echo "::error title=Release tag already exists::Tag $TAG already exists — has the version been bumped?"
            exit 1
          fi
        fi

        ON_RELEASE_BRANCH=false
        IFS=',' read -ra PATTERNS <<< "$RELEASE_BRANCH"
        for pattern in "${PATTERNS[@]}"; do
          pattern=$(echo "$pattern" | xargs)
          if [[ "$BRANCH" == $pattern ]]; then
            ON_RELEASE_BRANCH=true
            break
          fi
        done

        PREV_RELEASE_PATTERN="${TAG_FORMAT//\{version\}/[0-9]*.[0-9]*.[0-9]*}"
        PREV_RELEASE=$(git describe --tags --abbrev=0 --match="$PREV_RELEASE_PATTERN" HEAD^ 2>/dev/null || echo "")

        echo "release_tag=$TAG" >> $GITHUB_OUTPUT
        echo "commit_message=$COMMIT_MSG" >> $GITHUB_OUTPUT
        echo "branch=$BRANCH" >> $GITHUB_OUTPUT
        echo "on_release_branch=$ON_RELEASE_BRANCH" >> $GITHUB_OUTPUT
        echo "prev_release=$PREV_RELEASE" >> $GITHUB_OUTPUT
        echo "Validated $TAG @ $SHA ($COMMIT_MSG)"

    - name: Build distribution
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        BUILD_COMMAND: ${{ inputs.build_command }}
      run: |
        rm -rf dist
        if [ -n "$BUILD_COMMAND" ]; then
          echo "Running custom build: $BUILD_COMMAND"
          eval "$BUILD_COMMAND"
        else
          uv build
        fi
        uvx twine check dist/*

    - name: Dump Python environment
      if: ${{ failure() }}
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        echo "=== uv / Python ==="
        uv --version || echo "(uv unavailable)"
        uv run --no-project python --version || echo "(python unavailable)"
        echo "=== UV_PYTHON ==="
        echo "${UV_PYTHON:-(unset)}"
        echo "=== Built artifacts ==="
        ls -la dist 2>/dev/null || echo "(no dist/)"
        echo "=== pyproject.toml (release-relevant) ==="
        uv run --no-project python -c '
        import json, tomllib, pathlib
        t = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
        proj = t.get("project", {})
        print(json.dumps({
            "name": proj.get("name"),
            "version": proj.get("version") or ("(dynamic)" if "version" in proj.get("dynamic", []) else None),
            "requires-python": proj.get("requires-python"),
            "dependencies": proj.get("dependencies"),
            "optional-dependencies": sorted((proj.get("optional-dependencies") or {}).keys()),
            "build-system": t.get("build-system"),
        }, indent=2))
        ' 2>/dev/null || echo "(pyproject.toml unavailable)"
