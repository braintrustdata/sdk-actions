# GENERATED by scripts/generate.rb — edit templates/, not this file.
name: Publish Ruby Package
description: >
  Full Ruby gem release: checks out the SHA, builds the gem, generates and signs a
  CycloneDX SBOM plus SLSA build provenance (bound to the exact gem), publishes to
  RubyGems via OIDC trusted publishing (pushing that same gem — no rebuild), creates
  a GitHub release (with the SBOM attached), and sends a Slack completion
  notification. Covers the standard publish sequence for all Braintrust Ruby gems.

inputs:
  sha:
    description: "Commit SHA to check out and release"
    required: true
  checkout:
    description: "Check out the SHA before publishing. Set to false when the caller has already checked out and patched files."
    required: false
    default: 'true'
  working_directory:
    description: "Path to the gem root (where Gemfile and gemspec live)"
    required: false
    default: '.'
  ruby_version:
    description: "Ruby version to use, or a version file path (.tool-versions, .ruby-version)"
    required: false
    default: '4.0'
  dry_run:
    description: "Skip gem push, tag push, and GitHub release creation"
    required: false
    default: 'false'
  release_tag:
    description: "The release tag (e.g. v0.3.2)"
    required: true
  github_release:
    description: "Whether to create a GitHub release"
    required: false
    default: 'true'
  sbom:
    description: >
      Generate a CycloneDX SBOM, sign it (GitHub SBOM attestation bound to the
      published gem), and attach it to the GitHub release. Requires
      attestations: write on the job.
    required: false
    default: 'true'
  release_title:
    description: "GitHub release name/title. Defaults to the release tag when empty."
    required: false
    default: ''
  notes:
    description: "Base64-encoded release notes from the prepare action"
    required: false
    default: ''
  prev_release:
    description: "Previous release tag — used in completion notification"
    required: false
    default: ''
  branch:
    description: "Branch the release was made from"
    required: true
  on_release_branch:
    description: "Whether the SHA is on an expected release branch"
    required: true
  pr_list:
    description: "x1f-delimited PR list from prepare action"
    required: false
    default: ''
  gem_name:
    description: "RubyGems gem name — used to build the RubyGems link in notifications"
    required: false
    default: ''
  label:
    description: >
      Display name for release notifications (e.g. the gem name). When set, it becomes
      the notification subject instead of the repository — useful when a repo publishes
      multiple packages. Defaults to the repository.
    required: false
    default: ''
  slack_token:
    description: "Slack bot token"
    required: false
    default: ''
  slack_channel:
    description: "Slack channel ID"
    required: false
    default: ''
  slack_mention:
    description: "Optional Slack handle or group to @mention on completion"
    required: false
    default: ''
  failure_slack_mention:
    description: "Optional Slack handle or group to @mention if the gem push fails"
    required: false
    default: ''
  emoji:
    description: "Emoji prefix for Slack messages"
    required: false
    default: ':ruby:'

runs:
  using: composite
  steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      if: ${{ inputs.checkout == 'true' }}
      with:
        ref: ${{ inputs.sha }}
        fetch-depth: 0

    - name: Set up Ruby
      uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
      with:
        ruby-version: ${{ inputs.ruby_version }}
        bundler-cache: true
        working-directory: ${{ inputs.working_directory }}

    - name: Build gem
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        bundle exec rake build
        if [ "$(ls pkg/*.gem 2>/dev/null | wc -l)" -ne 1 ]; then
          echo "::error title=Build failed::expected exactly one gem at pkg/*.gem after 'rake build' — found: $(ls pkg/*.gem 2>/dev/null || echo none)"
          exit 1
        fi
        echo "Built $(ls pkg/*.gem)"

    - name: Generate SBOM (CycloneDX)
      if: ${{ inputs.sbom == 'true' }}
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        GEM_NAME: ${{ inputs.gem_name }}
      run: |
        if [ ! -f Gemfile.lock ]; then
          echo "::error title=SBOM failed::Gemfile.lock not found in $(pwd) — bundle install must run before SBOM generation."
          exit 1
        fi
        # Map Gemfile.lock → CycloneDX 1.6 JSON with Bundler's own lockfile parser.
        # Only the gem's RUNTIME closure is included: we walk the dependency graph
        # from the gem itself, so the dev/test toolchain (rubocop, rake, …) that lives
        # in Gemfile.lock but is not a runtime dependency of the published gem is
        # excluded. The gem is the SBOM subject (metadata.component), its runtime
        # dependency closure are the components.
        ruby <<'RUBY'
        require 'bundler'
        require 'json'
        require 'securerandom'
        lock = Bundler::LockfileParser.new(File.read('Gemfile.lock'))
        by_name = lock.specs.each_with_object({}) { |s, h| h[s.name] = s }
        # The gem being released: prefer the explicit gem_name, else the local
        # path/gemspec source spec (the gem defined in this repo).
        root_name = ENV['GEM_NAME'].to_s.empty? ? nil : ENV['GEM_NAME']
        root = (by_name[root_name] if root_name) ||
               lock.specs.find { |s| s.source.is_a?(Bundler::Source::Path) }
        abort("::error title=SBOM failed::could not identify the gem in Gemfile.lock (set gem_name).") unless root
        # Breadth-first over each spec's runtime dependencies (as recorded per-gem in
        # the GEM section of the lockfile), starting from the released gem.
        seen = {}
        queue = root.dependencies.map(&:name)
        until queue.empty?
          name = queue.shift
          next if seen[name] || !by_name[name]
          spec = by_name[name]
          seen[name] = spec
          queue.concat(spec.dependencies.map(&:name))
        end
        component = ->(s) do
          { 'type' => 'library', 'name' => s.name, 'version' => s.version.to_s,
            'purl' => "pkg:gem/#{s.name}@#{s.version}" }
        end
        bom = {
          'bomFormat'    => 'CycloneDX',
          'specVersion'  => '1.7',
          # Required: actions/attest recognizes CycloneDX only when bomFormat + specVersion
          # + serialNumber are all present (see actions/attest src/sbom.ts). Don't remove.
          'serialNumber' => "urn:uuid:#{SecureRandom.uuid}",
          'version'      => 1,
          'metadata'    => {
            # CycloneDX ≥1.5 tools shape (the array-of-tools form was deprecated in 1.5).
            'tools'     => { 'components' => [{ 'type' => 'application', 'group' => 'braintrust', 'name' => 'sdk-actions ruby sbom' }] },
            'component' => component.call(root).merge('type' => 'application'),
          },
          'components'  => seen.values.sort_by(&:name).map { |s| component.call(s) },
        }
        File.write('sbom.json', JSON.pretty_generate(bom))
        puts "Wrote #{Dir.pwd}/sbom.json (subject: #{root.name}, #{seen.size} runtime components)"
        RUBY

    - name: Attest SBOM
      if: ${{ inputs.sbom == 'true' && inputs.dry_run != 'true' }}
      uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
      with:
        subject-path: |-
          ${{ inputs.working_directory }}/pkg/*.gem
        sbom-path: ${{ inputs.working_directory }}/sbom.json

    - name: Attest build provenance
      if: ${{ inputs.dry_run != 'true' }}
      uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
      with:
        subject-path: ${{ inputs.working_directory }}/pkg/*.gem

    - name: Configure RubyGems credentials (OIDC trusted publishing)
      if: ${{ inputs.dry_run != 'true' }}
      uses: rubygems/configure-rubygems-credentials@dc5a8d8553e6ee01fc26761a49e99e733d17954a # v2.1.0
    - name: Push gem to RubyGems
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        DRY_RUN: ${{ inputs.dry_run }}
      run: |
        GEM=$(ls pkg/*.gem)
        if [ "$DRY_RUN" = "true" ]; then
          echo "DRY RUN: would gem push $GEM"
          exit 0
        fi
        gem push "$GEM" || {
          echo "::error title=gem push failed::OIDC/trusted-publisher error → RubyGems must list a trusted publisher for this gem with this repo + workflow (and environment if gated); 'Repushing of gem versions is not allowed' → the version already exists (bump it)."
          exit 1
        }

    - name: Create GitHub release
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        ENABLED: ${{ inputs.github_release }}
        DRY_RUN: ${{ inputs.dry_run }}
        TAG: ${{ inputs.release_tag }}
        RELEASE_TITLE: ${{ inputs.release_title }}
        NOTES_B64: ${{ inputs.notes }}
        SHA: ${{ inputs.sha }}
        SBOM_ENABLED: ${{ inputs.sbom }}
        WORKING_DIRECTORY: ${{ inputs.working_directory }}
      run: |
        if [ "$ENABLED" != "true" ]; then
          echo "GitHub release disabled; skipping."
          exit 0
        fi
        # Release name defaults to the tag when no explicit title is provided.
        TITLE="${RELEASE_TITLE:-$TAG}"
        if [ "$DRY_RUN" = "true" ]; then
          echo "DRY RUN: would create GitHub release $TAG (title: $TITLE)"
          echo "--- Release notes preview ---"
          echo "$NOTES_B64" | base64 -d 2>/dev/null || echo "(unavailable)"
        else
          echo "$NOTES_B64" | base64 -d 2>/dev/null > /tmp/release-notes.md
          gh release create "$TAG" \
            --title "$TITLE" \
            --notes-file /tmp/release-notes.md \
            --target "$SHA"
          # Attach the SBOM when one was generated for this release.
          if [ "$SBOM_ENABLED" = "true" ] && [ -f "$WORKING_DIRECTORY/sbom.json" ]; then
            gh release upload "$TAG" "$WORKING_DIRECTORY/sbom.json" --clobber
          fi
        fi

    - name: Build RubyGems links
      id: links
      shell: bash
      env:
        GEM_NAME: ${{ inputs.gem_name }}
        RELEASE_TAG: ${{ inputs.release_tag }}
        DRY_RUN: ${{ inputs.dry_run }}
      run: |
        LINKS='[]'
        if [ "$DRY_RUN" != "true" ] && [ -n "$GEM_NAME" ]; then
          VERSION="${RELEASE_TAG#v}"
          LINKS="[{\"label\":\"RubyGems\",\"url\":\"https://rubygems.org/gems/$GEM_NAME/versions/$VERSION\"}]"
        fi
        echo "links=$LINKS" >> $GITHUB_OUTPUT

    - name: Post release summary
      shell: bash
      env:
        TAG: ${{ inputs.release_tag }}
        LABEL: ${{ inputs.label }}
        PREV_RELEASE: ${{ inputs.prev_release }}
        BRANCH: ${{ inputs.branch }}
        ON_RELEASE_BRANCH: ${{ inputs.on_release_branch }}
        DRY_RUN: ${{ inputs.dry_run }}
        LINKS_JSON: ${{ steps.links.outputs.links }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        RELEASE_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/releases/tag/$TAG"
        BRANCH_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/tree/$BRANCH"

        # Subject is the package label when set (disambiguates repos that publish
        # multiple packages); otherwise the repository. The repo is still present in
        # every link below, so it is never lost.
        SUBJECT="$GITHUB_REPOSITORY"
        [ -n "$LABEL" ] && SUBJECT="$LABEL"

        if [ "$DRY_RUN" = "true" ]; then
          echo "## $SUBJECT $TAG — dry run complete" >> $GITHUB_STEP_SUMMARY
        else
          echo "## $SUBJECT $TAG — published ✅" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY

        if [ "$DRY_RUN" = "true" ]; then
          echo "> [!NOTE]" >> $GITHUB_STEP_SUMMARY
          echo "> Dry run: Nothing was tagged or published." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
        fi

        if [ "$ON_RELEASE_BRANCH" = "false" ]; then
          echo "> [!WARNING]" >> $GITHUB_STEP_SUMMARY
          echo "> Released from non-release branch: [$BRANCH]($BRANCH_URL)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
        fi

        echo "**Branch:** [$BRANCH]($BRANCH_URL)" >> $GITHUB_STEP_SUMMARY

        if [ -n "$PREV_RELEASE" ]; then
          DIFF_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/compare/${PREV_RELEASE}...$TAG"
          echo "**Diff:** [$PREV_RELEASE...$TAG]($DIFF_URL)" >> $GITHUB_STEP_SUMMARY
        fi

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Published to" >> $GITHUB_STEP_SUMMARY

        if [ "$DRY_RUN" = "true" ]; then
          echo "- [View dry run]($RUN_URL)" >> $GITHUB_STEP_SUMMARY
        else
          echo "- [GitHub Release]($RELEASE_URL)" >> $GITHUB_STEP_SUMMARY
          if [ -n "$LINKS_JSON" ] && [ "$LINKS_JSON" != "[]" ]; then
            echo "$LINKS_JSON" | jq -r '.[] | "- [\(.label)](\(.url))"' >> $GITHUB_STEP_SUMMARY
          fi
        fi

    - name: Build published message
      id: message-published
      shell: bash
      env:
        TAG: ${{ inputs.release_tag }}
        LABEL: ${{ inputs.label }}
        EMOJI: ${{ inputs.emoji }}
        BRANCH: ${{ inputs.branch }}
        ON_RELEASE_BRANCH: ${{ inputs.on_release_branch }}
        PREV_RELEASE: ${{ inputs.prev_release }}
        DRY_RUN: ${{ inputs.dry_run }}
        SLACK_MENTION: ${{ inputs.slack_mention }}
        LINKS_JSON: ${{ steps.links.outputs.links }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        PR_LIST_RAW: ${{ inputs.pr_list }}
      run: |
        RELEASE_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/releases/tag/$TAG"

        # Subject is the package label when set, else the repository (see summary step).
        SUBJECT="$GITHUB_REPOSITORY"
        [ -n "$LABEL" ] && SUBJECT="$LABEL"

        DIFF_PART=""
        if [ -n "$PREV_RELEASE" ]; then
          DIFF_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/compare/${PREV_RELEASE}...$TAG"
          DIFF_PART="<$DIFF_URL|${PREV_RELEASE}...$TAG>  ·  "
        fi

        PR_LIST=$(echo "$PR_LIST_RAW" | tr $'\x1f' '\n' | sed '/^$/d')

        if [ "$DRY_RUN" = "true" ]; then
          TEXT="$EMOJI *$SUBJECT $TAG* complete"
          TEXT="$TEXT\n> :information_source: _Dry run: nothing tagged or published._"
        else
          TEXT="$EMOJI *$SUBJECT $TAG* published"
        fi

        if [ "$ON_RELEASE_BRANCH" = "false" ]; then
          BRANCH_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/tree/$BRANCH"
          TEXT="$TEXT\n> ⚠️ NOT on release branch: <$BRANCH_URL|$BRANCH>"
        fi

        if [ "$DRY_RUN" = "true" ]; then
          TEXT="$TEXT\n${DIFF_PART}<$RUN_URL|View dry run>"
        else
          SLACK_LINKS="${DIFF_PART}<$RELEASE_URL|View release>"
          if [ -n "$LINKS_JSON" ] && [ "$LINKS_JSON" != "[]" ]; then
            EXTRA=$(echo "$LINKS_JSON" | jq -r '[.[] | "<\(.url)|\(.label)>"] | join("  ·  ")')
            SLACK_LINKS="$SLACK_LINKS  ·  $EXTRA"
          fi
          TEXT="$TEXT\n$SLACK_LINKS"
        fi

        if [ -n "$PR_LIST" ]; then
          TEXT="$TEXT\n$PR_LIST"
        fi

        if [ -n "$SLACK_MENTION" ]; then
          TEXT="$TEXT\n$SLACK_MENTION"
        fi

        { echo 'text<<SLACK_DELIMITER'
          printf '%s\n' "$TEXT"
          echo 'SLACK_DELIMITER'
        } >> $GITHUB_OUTPUT

    - name: Send Slack message
      shell: bash
      env:
        SLACK_BOT_TOKEN: ${{ inputs.slack_token }}
        SLACK_CHANNEL: ${{ inputs.slack_channel }}
        TEXT: ${{ steps.message-published.outputs.text }}
        FAIL_ON_ERROR: 'false'
      run: |
        # Self-guard: no-op when Slack isn't configured, so callers needn't gate this step.
        if [ -z "$SLACK_BOT_TOKEN" ] || [ -z "$SLACK_CHANNEL" ]; then
          echo "Slack not configured; skipping notification."
          exit 0
        fi
        # jq --arg passes strings literally, so \n must be real newlines before encoding
        TEXT=$(printf '%b' "$TEXT")
        RESPONSE=$(curl -s --max-time 10 -X POST "https://slack.com/api/chat.postMessage" \
          -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
          -H "Content-Type: application/json; charset=utf-8" \
          -d "$(jq -n --arg channel "$SLACK_CHANNEL" --arg text "$TEXT" \
            '{channel: $channel, text: $text}')") || true
        if echo "$RESPONSE" | jq -e '.ok' > /dev/null 2>&1; then
          echo "Slack notification sent."
        elif [ "$FAIL_ON_ERROR" = "true" ]; then
          echo "::error title=Slack notification failed::$RESPONSE"
          exit 1
        else
          echo "::warning::Slack notification failed: $RESPONSE"
        fi

    - name: Dump Ruby environment
      if: ${{ failure() }}
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        echo "=== Ruby environment ==="
        ruby --version
        bundle --version
        echo "=== Default gems (version conflicts may cause activation errors) ==="
        ruby -e "Gem::Specification.default_stubs.map { |s| \"#{s.name} #{s.version}\" }.sort.each { |g| puts g }"
        echo "=== Gemfile.lock BUNDLED WITH ==="
        grep -A1 "^BUNDLED WITH" Gemfile.lock 2>/dev/null || echo "(not found)"

    - name: Build failure message
      if: ${{ failure() }}
      id: message-failure
      shell: bash
      env:
        RELEASE_TAG: ${{ inputs.release_tag }}
        LABEL: ${{ inputs.label }}
        STEP: publish
        SLACK_MENTION: ${{ inputs.failure_slack_mention }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        ACTOR_LINK: <${{ github.server_url }}/${{ github.actor }}|${{ github.actor }}>
      run: |
        # Subject is the package label when set, else the repository.
        SUBJECT="$GITHUB_REPOSITORY"
        [ -n "$LABEL" ] && SUBJECT="$LABEL"

        TEXT=":x: *$SUBJECT $RELEASE_TAG* failed at $STEP"
        TEXT="$TEXT\nInitiated by: $ACTOR_LINK"

        if [ -n "$SLACK_MENTION" ]; then
          TEXT="$TEXT  $SLACK_MENTION"
        fi

        TEXT="$TEXT\n<$RUN_URL|View failed run>"

        { echo 'text<<SLACK_DELIMITER'
          printf '%s\n' "$TEXT"
          echo 'SLACK_DELIMITER'
        } >> $GITHUB_OUTPUT

    - name: Send Slack message
      if: ${{ failure() }}
      shell: bash
      env:
        SLACK_BOT_TOKEN: ${{ inputs.slack_token }}
        SLACK_CHANNEL: ${{ inputs.slack_channel }}
        TEXT: ${{ steps.message-failure.outputs.text }}
        FAIL_ON_ERROR: 'false'
      run: |
        # Self-guard: no-op when Slack isn't configured, so callers needn't gate this step.
        if [ -z "$SLACK_BOT_TOKEN" ] || [ -z "$SLACK_CHANNEL" ]; then
          echo "Slack not configured; skipping notification."
          exit 0
        fi
        # jq --arg passes strings literally, so \n must be real newlines before encoding
        TEXT=$(printf '%b' "$TEXT")
        RESPONSE=$(curl -s --max-time 10 -X POST "https://slack.com/api/chat.postMessage" \
          -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
          -H "Content-Type: application/json; charset=utf-8" \
          -d "$(jq -n --arg channel "$SLACK_CHANNEL" --arg text "$TEXT" \
            '{channel: $channel, text: $text}')") || true
        if echo "$RESPONSE" | jq -e '.ok' > /dev/null 2>&1; then
          echo "Slack notification sent."
        elif [ "$FAIL_ON_ERROR" = "true" ]; then
          echo "::error title=Slack notification failed::$RESPONSE"
          exit 1
        else
          echo "::warning::Slack notification failed: $RESPONSE"
        fi
