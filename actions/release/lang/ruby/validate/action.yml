# GENERATED by scripts/generate.rb — edit templates/, not this file.
name: Validate Ruby Release
description: >
  Checks out the release SHA, sets up Ruby, reads the gem version, validates
  the release (RubyGems availability, tag existence, branch, commit metadata),
  and runs lint, build, and SBOM generation to confirm the gem is publishable
  (and the SBOM tooling works) before the approval gate.

inputs:
  sha:
    description: "Commit SHA being released"
    required: true
  dry_run:
    description: "Skip tag existence failure in dry runs"
    required: false
    default: 'false'
  version:
    description: >
      Explicit version override. If provided, version_file and version_module
      are ignored. Use when the version is computed externally (e.g. bt-publishing-test
      auto-bump from run number).
    required: false
    default: ''
  version_file:
    description: "Path to the Ruby version file (e.g. lib/gem_name/version.rb)"
    required: false
    default: ''
  version_module:
    description: "Ruby module holding the VERSION constant (e.g. GemName)"
    required: false
    default: ''
  working_directory:
    description: "Path to the gem root (where Gemfile and gemspec live)"
    required: false
    default: '.'
  package_name:
    description: >
      RubyGems gem name. When set, validate fails fast if this version is already
      published — the registry, not the git tag, is the source of truth (covers
      prereleases and force-deleted tags). Leave empty to skip.
    required: false
    default: ''
  ruby_version:
    description: "Ruby version to use, or a version file path (.tool-versions, .ruby-version)"
    required: false
    default: '4.0'
  sbom:
    description: >
      Generate a CycloneDX SBOM as a pre-gate check (same generator as publish), so
      SBOM-generation failures surface BEFORE the approval gate. Not signed or
      attached here — that happens in publish.
    required: false
    default: 'true'
outputs:
  release_tag:
    description: "The release tag (e.g. v0.3.2)"
    value: ${{ steps.validate.outputs.release_tag }}
  prev_release:
    description: "The previous release tag"
    value: ${{ steps.validate.outputs.prev_release }}
  branch:
    description: "The branch containing the SHA"
    value: ${{ steps.validate.outputs.branch }}
  on_release_branch:
    description: "Whether the SHA is on an expected release branch"
    value: ${{ steps.validate.outputs.on_release_branch }}
  commit_message:
    description: "The commit message at the SHA"
    value: ${{ steps.validate.outputs.commit_message }}

runs:
  using: composite
  steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ inputs.sha }}
        fetch-depth: 0

    - name: Set up Ruby
      uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
      with:
        ruby-version: ${{ inputs.ruby_version }}
        bundler-cache: true
        working-directory: ${{ inputs.working_directory }}

    - name: Read version
      id: read-version
      shell: bash
      env:
        VERSION_OVERRIDE: ${{ inputs.version }}
        VERSION_FILE: ${{ inputs.version_file }}
        VERSION_MODULE: ${{ inputs.version_module }}
      run: |
        if [ -n "$VERSION_OVERRIDE" ]; then
          VERSION="$VERSION_OVERRIDE"
        else
          VERSION=$(ruby -r "./$VERSION_FILE" -e "puts Object.const_get(ENV.fetch('VERSION_MODULE')).const_get(:VERSION)")
        fi
        if [ -z "$VERSION" ]; then
          echo "::error title=Could not read version::resolved an empty version — check VERSION in $VERSION_FILE (module $VERSION_MODULE), or pass a version override."
          exit 1
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Check RubyGems version availability
      shell: bash
      env:
        PACKAGE_NAME: ${{ inputs.package_name }}
        VERSION: ${{ steps.read-version.outputs.version }}
      run: |
        if [ -z "$PACKAGE_NAME" ]; then
          echo "No package_name provided; skipping RubyGems availability check."
          exit 0
        fi
        CODE=$(curl -sS -o /dev/null -w '%{http_code}' \
          --retry 3 --retry-connrefused --max-time 30 \
          "https://rubygems.org/api/v2/rubygems/$PACKAGE_NAME/versions/$VERSION.json")
        case "$CODE" in
          200)
            echo "::error title=Version already published::$PACKAGE_NAME $VERSION already exists on RubyGems — has the version been bumped?"
            exit 1
            ;;
          404)
            echo "$PACKAGE_NAME $VERSION is available on RubyGems."
            ;;
          *)
            echo "::error title=Registry check failed::unexpected response from RubyGems (HTTP $CODE) checking $PACKAGE_NAME $VERSION — cannot confirm the version is unpublished; aborting rather than risk a bad release."
            exit 1
            ;;
        esac

    - name: Validate SHA format
      shell: bash
      env:
        SHA: ${{ inputs.sha }}
      run: |
        if ! echo "$SHA" | grep -qE '^[0-9a-f]{40}$'; then
          echo "::error title=Invalid release SHA::sha must be a full 40-character commit SHA — branch names and short SHAs are not accepted."
          exit 1
        fi

    - name: Validate release
      id: validate
      shell: bash
      env:
        VERSION: ${{ steps.read-version.outputs.version }}
        TAG_FORMAT: 'v{version}'
        DRY_RUN: ${{ inputs.dry_run }}
        RELEASE_BRANCH: 'main'
        SHA: ${{ inputs.sha }}
      run: |
        TAG="${TAG_FORMAT//\{version\}/$VERSION}"
        COMMIT_MSG=$(git log -1 --format="%s" HEAD)
        BRANCH=$(git branch -r --contains HEAD --format="%(refname:short)" | sed 's|origin/||' | head -1)

        if git rev-parse "$TAG" >/dev/null 2>&1; then
          if [ "$DRY_RUN" = "true" ]; then
            echo "::warning title=Release tag already exists::Tag $TAG already exists — skipping in dry run."
          else
            echo "::error title=Release tag already exists::Tag $TAG already exists — has the version been bumped?"
            exit 1
          fi
        fi

        ON_RELEASE_BRANCH=false
        IFS=',' read -ra PATTERNS <<< "$RELEASE_BRANCH"
        for pattern in "${PATTERNS[@]}"; do
          pattern=$(echo "$pattern" | xargs)
          if [[ "$BRANCH" == $pattern ]]; then
            ON_RELEASE_BRANCH=true
            break
          fi
        done

        PREV_RELEASE_PATTERN="${TAG_FORMAT//\{version\}/[0-9]*.[0-9]*.[0-9]*}"
        PREV_RELEASE=$(git describe --tags --abbrev=0 --match="$PREV_RELEASE_PATTERN" HEAD^ 2>/dev/null || echo "")

        echo "release_tag=$TAG" >> $GITHUB_OUTPUT
        echo "commit_message=$COMMIT_MSG" >> $GITHUB_OUTPUT
        echo "branch=$BRANCH" >> $GITHUB_OUTPUT
        echo "on_release_branch=$ON_RELEASE_BRANCH" >> $GITHUB_OUTPUT
        echo "prev_release=$PREV_RELEASE" >> $GITHUB_OUTPUT
        echo "Validated $TAG @ $SHA ($COMMIT_MSG)"

    - name: Lint
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: bundle exec rake lint

    - name: Build gem
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        bundle exec rake build
        if [ "$(ls pkg/*.gem 2>/dev/null | wc -l)" -ne 1 ]; then
          echo "::error title=Build failed::expected exactly one gem at pkg/*.gem after 'rake build' — found: $(ls pkg/*.gem 2>/dev/null || echo none)"
          exit 1
        fi
        echo "Built $(ls pkg/*.gem)"

    - name: Generate SBOM (CycloneDX)
      if: ${{ inputs.sbom == 'true' }}
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        GEM_NAME: ${{ inputs.gem_name }}
      run: |
        if [ ! -f Gemfile.lock ]; then
          echo "::error title=SBOM failed::Gemfile.lock not found in $(pwd) — bundle install must run before SBOM generation."
          exit 1
        fi
        # Map Gemfile.lock → CycloneDX 1.6 JSON with Bundler's own lockfile parser.
        # Only the gem's RUNTIME closure is included: we walk the dependency graph
        # from the gem itself, so the dev/test toolchain (rubocop, rake, …) that lives
        # in Gemfile.lock but is not a runtime dependency of the published gem is
        # excluded. The gem is the SBOM subject (metadata.component), its runtime
        # dependency closure are the components.
        ruby <<'RUBY'
        require 'bundler'
        require 'json'
        require 'securerandom'
        lock = Bundler::LockfileParser.new(File.read('Gemfile.lock'))
        by_name = lock.specs.each_with_object({}) { |s, h| h[s.name] = s }
        # The gem being released: prefer the explicit gem_name, else the local
        # path/gemspec source spec (the gem defined in this repo).
        root_name = ENV['GEM_NAME'].to_s.empty? ? nil : ENV['GEM_NAME']
        root = (by_name[root_name] if root_name) ||
               lock.specs.find { |s| s.source.is_a?(Bundler::Source::Path) }
        abort("::error title=SBOM failed::could not identify the gem in Gemfile.lock (set gem_name).") unless root
        # Breadth-first over each spec's runtime dependencies (as recorded per-gem in
        # the GEM section of the lockfile), starting from the released gem.
        seen = {}
        queue = root.dependencies.map(&:name)
        until queue.empty?
          name = queue.shift
          next if seen[name] || !by_name[name]
          spec = by_name[name]
          seen[name] = spec
          queue.concat(spec.dependencies.map(&:name))
        end
        component = ->(s) do
          { 'type' => 'library', 'name' => s.name, 'version' => s.version.to_s,
            'purl' => "pkg:gem/#{s.name}@#{s.version}" }
        end
        bom = {
          'bomFormat'    => 'CycloneDX',
          'specVersion'  => '1.7',
          # Required: actions/attest recognizes CycloneDX only when bomFormat + specVersion
          # + serialNumber are all present (see actions/attest src/sbom.ts). Don't remove.
          'serialNumber' => "urn:uuid:#{SecureRandom.uuid}",
          'version'      => 1,
          'metadata'    => {
            # CycloneDX ≥1.5 tools shape (the array-of-tools form was deprecated in 1.5).
            'tools'     => { 'components' => [{ 'type' => 'application', 'group' => 'braintrust', 'name' => 'sdk-actions ruby sbom' }] },
            'component' => component.call(root).merge('type' => 'application'),
          },
          'components'  => seen.values.sort_by(&:name).map { |s| component.call(s) },
        }
        File.write('sbom.json', JSON.pretty_generate(bom))
        puts "Wrote #{Dir.pwd}/sbom.json (subject: #{root.name}, #{seen.size} runtime components)"
        RUBY

    - name: Dump Ruby environment
      if: ${{ failure() }}
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        echo "=== Ruby environment ==="
        ruby --version
        bundle --version
        echo "=== Default gems (version conflicts may cause activation errors) ==="
        ruby -e "Gem::Specification.default_stubs.map { |s| \"#{s.name} #{s.version}\" }.sort.each { |g| puts g }"
        echo "=== Gemfile.lock BUNDLED WITH ==="
        grep -A1 "^BUNDLED WITH" Gemfile.lock 2>/dev/null || echo "(not found)"
