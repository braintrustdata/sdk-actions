# GENERATED by scripts/generate.rb — edit templates/, not this file.
name: Publish JavaScript Package
description: >
  Full JavaScript package release: checks out the SHA, sets up Node and pnpm,
  builds, generates and signs a CycloneDX SBOM (bound to the published tarball),
  publishes to npm (OIDC trusted publishing + provenance), creates a GitHub release
  (with the SBOM attached), and sends a Slack completion notification. Covers the
  standard publish sequence for Braintrust npm packages.

inputs:
  sha:
    description: "Commit SHA to check out and release"
    required: true
  checkout:
    description: "Check out the SHA before publishing. Set to false when the caller has already checked out and patched files."
    required: false
    default: 'true'
  working_directory:
    description: "Path to the package root (where package.json lives)"
    required: false
    default: '.'
  node_version:
    description: >
      Node version (e.g. 24), or a path to a version file
      (.tool-versions, .nvmrc, .node-version) relative to the repo root.
    required: true
  pnpm_version:
    description: "pnpm version to install. When empty, read from package.json packageManager."
    required: false
    default: ''
  build:
    description: >
      Whether to run the build step. Set to 'false' for packages that publish
      their sources directly (no build) — the build step then no-ops.
    required: false
    default: 'true'
  build_command:
    description: "npm script to run for the build (when build is 'true')"
    required: false
    default: 'build'
  dry_run:
    description: "Skip npm publish, tag push, and GitHub release creation"
    required: false
    default: 'false'
  release_tag:
    description: "The release tag (e.g. v0.3.2)"
    required: true
  version:
    description: "The package version — used to build the npm link in notifications"
    required: false
    default: ''
  github_release:
    description: "Whether to create a GitHub release"
    required: false
    default: 'true'
  release_title:
    description: "GitHub release name/title. Defaults to the release tag when empty."
    required: false
    default: ''
  npm:
    description: "Whether to publish to the npm registry"
    required: false
    default: 'true'
  registry:
    description: "npm registry URL"
    required: false
    default: 'https://registry.npmjs.org'
  access:
    description: "npm publish access: public | restricted (provenance requires public)"
    required: false
    default: 'public'
  provenance:
    description: "Whether to publish with provenance/attestation (requires a public package)"
    required: false
    default: 'true'
  sbom:
    description: >
      Generate a CycloneDX SBOM (pnpm sbom — needs pnpm ≥ 11.8), sign it (GitHub
      SBOM attestation bound to the published tarball), and attach it to the
      GitHub release. Requires attestations: write on the job.
    required: false
    default: 'true'
  channel:
    description: "npm release channel (dist-tag) to publish under"
    required: false
    default: 'latest'
  notes:
    description: "Base64-encoded release notes from the prepare action"
    required: false
    default: ''
  prev_release:
    description: "Previous release tag — used in completion notification"
    required: false
    default: ''
  branch:
    description: "Branch the release was made from"
    required: true
  on_release_branch:
    description: "Whether the SHA is on an expected release branch"
    required: true
  pr_list:
    description: "x1f-delimited PR list from prepare action"
    required: false
    default: ''
  package_name:
    description: "npm package name — used to build the npm link in notifications"
    required: false
    default: ''
  label:
    description: >
      Display name for release notifications (e.g. the package name). When set, it
      becomes the notification subject instead of the repository — useful when a repo
      publishes multiple packages. Defaults to the repository.
    required: false
    default: ''
  slack_token:
    description: "Slack bot token"
    required: false
    default: ''
  slack_channel:
    description: "Slack channel ID"
    required: false
    default: ''
  slack_mention:
    description: "Optional Slack handle or group to @mention on completion"
    required: false
    default: ''
  failure_slack_mention:
    description: "Optional Slack handle or group to @mention if the publish fails"
    required: false
    default: ''
  emoji:
    description: "Emoji prefix for Slack messages"
    required: false
    default: ':package:'

runs:
  using: composite
  steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      if: ${{ inputs.checkout == 'true' }}
      with:
        ref: ${{ inputs.sha }}
        fetch-depth: 0

    - name: Set up pnpm
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      with:
        # Empty version → action-setup reads the pnpm version from this package.json's
        # "packageManager" field (one source of truth). A non-empty value overrides it.
        version: ${{ inputs.pnpm_version }}
        package_json_file: ${{ inputs.working_directory }}/package.json

    - name: Resolve Node version source
      id: node-src
      shell: bash
      env:
        NODE_VERSION: ${{ inputs.node_version }}
      run: |
        # node_version is either an explicit version (e.g. 24) or a path to a version
        # file (.tool-versions / .nvmrc / .node-version). Route by file existence so a
        # single input covers both; paths are relative to the repo root (as setup-node expects).
        if [ -n "$NODE_VERSION" ] && [ -f "$NODE_VERSION" ]; then
          echo "file=$NODE_VERSION" >> "$GITHUB_OUTPUT"
          echo "spec=" >> "$GITHUB_OUTPUT"
        else
          echo "file=" >> "$GITHUB_OUTPUT"
          echo "spec=$NODE_VERSION" >> "$GITHUB_OUTPUT"
        fi

    - name: Set up Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ steps.node-src.outputs.spec }}
        node-version-file: ${{ steps.node-src.outputs.file }}
        registry-url: ${{ inputs.registry }}
        cache: pnpm
        cache-dependency-path: ${{ inputs.working_directory }}/pnpm-lock.yaml

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        pnpm install --frozen-lockfile || {
          echo "::error title=Dependency install failed::'pnpm install --frozen-lockfile' failed — the lockfile is likely out of sync with package.json (run 'pnpm install' and commit pnpm-lock.yaml)."
          exit 1
        }

    - name: Build
      if: ${{ inputs.build == 'true' }}
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        BUILD_COMMAND: ${{ inputs.build_command }}
      run: |
        pnpm run "$BUILD_COMMAND"

    - name: Generate SBOM (CycloneDX)
      if: ${{ inputs.sbom == 'true' }}
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        if ! pnpm sbom --help >/dev/null 2>&1; then
          echo "::error title=pnpm sbom unavailable::'pnpm sbom' needs pnpm >= 11.8. Set the package's packageManager (or pnpm_version) to >= 11.8."
          exit 1
        fi
        pnpm sbom --sbom-format cyclonedx --prod --out sbom.json
        echo "Wrote $(pwd)/sbom.json"

    - name: Pack tarball for SBOM attestation
      if: ${{ inputs.sbom == 'true' && inputs.dry_run != 'true' }}
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        # pnpm pack emits the exact tarball `pnpm publish` will upload (one packing
        # pipeline in pnpm ≥ 11.8), so attesting it binds the SBOM to the published
        # digest. Packed into a temp dir OUTSIDE the package so it can't be published.
        PACKDIR=$(mktemp -d)
        pnpm pack --pack-destination "$PACKDIR" >/dev/null
        mv "$PACKDIR"/*.tgz "$RUNNER_TEMP/sbom-subject.tgz"
    - name: Attest SBOM
      if: ${{ inputs.sbom == 'true' && inputs.dry_run != 'true' }}
      uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
      with:
        subject-path: |-
          ${{ runner.temp }}/sbom-subject.tgz
        sbom-path: ${{ inputs.working_directory }}/sbom.json

    - name: Publish to npm
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        NPM_ENABLED: ${{ inputs.npm }}
        DRY_RUN: ${{ inputs.dry_run }}
        CHANNEL: ${{ inputs.channel }}
        ACCESS: ${{ inputs.access }}
        PROVENANCE: ${{ inputs.provenance }}
        REGISTRY: ${{ inputs.registry }}
        # Force OIDC: clear any inherited token so the publish can't fall back to token auth.
        NODE_AUTH_TOKEN: ''
        NPM_TOKEN: ''
      run: |
        if [ "$NPM_ENABLED" != "true" ]; then
          echo "npm registry publishing disabled; skipping."
          exit 0
        fi
        # pnpm delegates the upload to this npm CLI; pin >= 11.5.1 for OIDC (newer than setup-node's).
        npm install -g "npm@11.6.2"
        # --no-git-checks: the publish tree may be patched/detached (e.g. an rc version in package.json).
        ARGS=(--tag "$CHANNEL" --access "$ACCESS" --registry "$REGISTRY" --no-git-checks)
        [ "$PROVENANCE" = "true" ] && ARGS+=(--provenance)
        if [ "$DRY_RUN" = "true" ]; then
          echo "DRY RUN: pnpm publish ${ARGS[*]} --dry-run"
          ARGS+=(--dry-run)
        fi
        pnpm publish "${ARGS[@]}" || {
          echo "::error title=npm publish failed::auth/ENEEDAUTH → the npm trusted publisher must list this repo, workflow, and (if gated) environment; 'cannot publish over <version>' → the version already exists on npm (bump it)."
          exit 1
        }

    - name: Create GitHub release
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        ENABLED: ${{ inputs.github_release }}
        DRY_RUN: ${{ inputs.dry_run }}
        TAG: ${{ inputs.release_tag }}
        RELEASE_TITLE: ${{ inputs.release_title }}
        NOTES_B64: ${{ inputs.notes }}
        SHA: ${{ inputs.sha }}
        SBOM_ENABLED: ${{ inputs.sbom }}
        WORKING_DIRECTORY: ${{ inputs.working_directory }}
      run: |
        if [ "$ENABLED" != "true" ]; then
          echo "GitHub release disabled; skipping."
          exit 0
        fi
        # Release name defaults to the tag when no explicit title is provided.
        TITLE="${RELEASE_TITLE:-$TAG}"
        if [ "$DRY_RUN" = "true" ]; then
          echo "DRY RUN: would create GitHub release $TAG (title: $TITLE)"
          echo "--- Release notes preview ---"
          echo "$NOTES_B64" | base64 -d 2>/dev/null || echo "(unavailable)"
        else
          echo "$NOTES_B64" | base64 -d 2>/dev/null > /tmp/release-notes.md
          gh release create "$TAG" \
            --title "$TITLE" \
            --notes-file /tmp/release-notes.md \
            --target "$SHA"
          # Attach the SBOM when one was generated for this release.
          if [ "$SBOM_ENABLED" = "true" ] && [ -f "$WORKING_DIRECTORY/sbom.json" ]; then
            gh release upload "$TAG" "$WORKING_DIRECTORY/sbom.json" --clobber
          fi
        fi

    - name: Build npm links
      id: links
      shell: bash
      env:
        PACKAGE_NAME: ${{ inputs.package_name }}
        VERSION: ${{ inputs.version }}
        DRY_RUN: ${{ inputs.dry_run }}
      run: |
        LINKS='[]'
        if [ "$DRY_RUN" != "true" ] && [ -n "$PACKAGE_NAME" ] && [ -n "$VERSION" ]; then
          LINKS="[{\"label\":\"npm\",\"url\":\"https://www.npmjs.com/package/$PACKAGE_NAME/v/$VERSION\"}]"
        fi
        echo "links=$LINKS" >> $GITHUB_OUTPUT

    - name: Post release summary
      shell: bash
      env:
        TAG: ${{ inputs.release_tag }}
        LABEL: ${{ inputs.label }}
        PREV_RELEASE: ${{ inputs.prev_release }}
        BRANCH: ${{ inputs.branch }}
        ON_RELEASE_BRANCH: ${{ inputs.on_release_branch }}
        DRY_RUN: ${{ inputs.dry_run }}
        LINKS_JSON: ${{ steps.links.outputs.links }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        RELEASE_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/releases/tag/$TAG"
        BRANCH_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/tree/$BRANCH"

        # Subject is the package label when set (disambiguates repos that publish
        # multiple packages); otherwise the repository. The repo is still present in
        # every link below, so it is never lost.
        SUBJECT="$GITHUB_REPOSITORY"
        [ -n "$LABEL" ] && SUBJECT="$LABEL"

        if [ "$DRY_RUN" = "true" ]; then
          echo "## $SUBJECT $TAG — dry run complete" >> $GITHUB_STEP_SUMMARY
        else
          echo "## $SUBJECT $TAG — published ✅" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY

        if [ "$DRY_RUN" = "true" ]; then
          echo "> [!NOTE]" >> $GITHUB_STEP_SUMMARY
          echo "> Dry run: Nothing was tagged or published." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
        fi

        if [ "$ON_RELEASE_BRANCH" = "false" ]; then
          echo "> [!WARNING]" >> $GITHUB_STEP_SUMMARY
          echo "> Released from non-release branch: [$BRANCH]($BRANCH_URL)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
        fi

        echo "**Branch:** [$BRANCH]($BRANCH_URL)" >> $GITHUB_STEP_SUMMARY

        if [ -n "$PREV_RELEASE" ]; then
          DIFF_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/compare/${PREV_RELEASE}...$TAG"
          echo "**Diff:** [$PREV_RELEASE...$TAG]($DIFF_URL)" >> $GITHUB_STEP_SUMMARY
        fi

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Published to" >> $GITHUB_STEP_SUMMARY

        if [ "$DRY_RUN" = "true" ]; then
          echo "- [View dry run]($RUN_URL)" >> $GITHUB_STEP_SUMMARY
        else
          echo "- [GitHub Release]($RELEASE_URL)" >> $GITHUB_STEP_SUMMARY
          if [ -n "$LINKS_JSON" ] && [ "$LINKS_JSON" != "[]" ]; then
            echo "$LINKS_JSON" | jq -r '.[] | "- [\(.label)](\(.url))"' >> $GITHUB_STEP_SUMMARY
          fi
        fi

    - name: Build published message
      id: message-published
      shell: bash
      env:
        TAG: ${{ inputs.release_tag }}
        LABEL: ${{ inputs.label }}
        EMOJI: ${{ inputs.emoji }}
        BRANCH: ${{ inputs.branch }}
        ON_RELEASE_BRANCH: ${{ inputs.on_release_branch }}
        PREV_RELEASE: ${{ inputs.prev_release }}
        DRY_RUN: ${{ inputs.dry_run }}
        SLACK_MENTION: ${{ inputs.slack_mention }}
        LINKS_JSON: ${{ steps.links.outputs.links }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        PR_LIST_RAW: ${{ inputs.pr_list }}
      run: |
        RELEASE_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/releases/tag/$TAG"

        # Subject is the package label when set, else the repository (see summary step).
        SUBJECT="$GITHUB_REPOSITORY"
        [ -n "$LABEL" ] && SUBJECT="$LABEL"

        DIFF_PART=""
        if [ -n "$PREV_RELEASE" ]; then
          DIFF_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/compare/${PREV_RELEASE}...$TAG"
          DIFF_PART="<$DIFF_URL|${PREV_RELEASE}...$TAG>  ·  "
        fi

        PR_LIST=$(echo "$PR_LIST_RAW" | tr $'\x1f' '\n' | sed '/^$/d')

        if [ "$DRY_RUN" = "true" ]; then
          TEXT="$EMOJI *$SUBJECT $TAG* complete"
          TEXT="$TEXT\n> :information_source: _Dry run: nothing tagged or published._"
        else
          TEXT="$EMOJI *$SUBJECT $TAG* published"
        fi

        if [ "$ON_RELEASE_BRANCH" = "false" ]; then
          BRANCH_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/tree/$BRANCH"
          TEXT="$TEXT\n> ⚠️ NOT on release branch: <$BRANCH_URL|$BRANCH>"
        fi

        if [ "$DRY_RUN" = "true" ]; then
          TEXT="$TEXT\n${DIFF_PART}<$RUN_URL|View dry run>"
        else
          SLACK_LINKS="${DIFF_PART}<$RELEASE_URL|View release>"
          if [ -n "$LINKS_JSON" ] && [ "$LINKS_JSON" != "[]" ]; then
            EXTRA=$(echo "$LINKS_JSON" | jq -r '[.[] | "<\(.url)|\(.label)>"] | join("  ·  ")')
            SLACK_LINKS="$SLACK_LINKS  ·  $EXTRA"
          fi
          TEXT="$TEXT\n$SLACK_LINKS"
        fi

        if [ -n "$PR_LIST" ]; then
          TEXT="$TEXT\n$PR_LIST"
        fi

        if [ -n "$SLACK_MENTION" ]; then
          TEXT="$TEXT\n$SLACK_MENTION"
        fi

        { echo 'text<<SLACK_DELIMITER'
          printf '%s\n' "$TEXT"
          echo 'SLACK_DELIMITER'
        } >> $GITHUB_OUTPUT

    - name: Send Slack message
      shell: bash
      env:
        SLACK_BOT_TOKEN: ${{ inputs.slack_token }}
        SLACK_CHANNEL: ${{ inputs.slack_channel }}
        TEXT: ${{ steps.message-published.outputs.text }}
        FAIL_ON_ERROR: 'false'
      run: |
        # Self-guard: no-op when Slack isn't configured, so callers needn't gate this step.
        if [ -z "$SLACK_BOT_TOKEN" ] || [ -z "$SLACK_CHANNEL" ]; then
          echo "Slack not configured; skipping notification."
          exit 0
        fi
        # jq --arg passes strings literally, so \n must be real newlines before encoding
        TEXT=$(printf '%b' "$TEXT")
        RESPONSE=$(curl -s --max-time 10 -X POST "https://slack.com/api/chat.postMessage" \
          -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
          -H "Content-Type: application/json; charset=utf-8" \
          -d "$(jq -n --arg channel "$SLACK_CHANNEL" --arg text "$TEXT" \
            '{channel: $channel, text: $text}')") || true
        if echo "$RESPONSE" | jq -e '.ok' > /dev/null 2>&1; then
          echo "Slack notification sent."
        elif [ "$FAIL_ON_ERROR" = "true" ]; then
          echo "::error title=Slack notification failed::$RESPONSE"
          exit 1
        else
          echo "::warning::Slack notification failed: $RESPONSE"
        fi

    - name: Dump JavaScript environment
      if: ${{ failure() }}
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        echo "=== Node environment ==="
        node --version
        npm --version
        echo "=== pnpm ==="
        pnpm --version || echo "(unavailable)"
        echo "=== package.json ==="
        node -e '
          const p = require("./package.json");
          console.log(JSON.stringify({
            name: p.name,
            version: p.version,
            private: p.private || false,
            packageManager: p.packageManager,
            engines: p.engines,
            devEngines: p.devEngines,
            publishConfig: p.publishConfig,
            lifecycle: Object.fromEntries(
              ["prepublishOnly", "prepack", "prepare", "postpack"]
                .filter((k) => p.scripts && p.scripts[k])
                .map((k) => [k, p.scripts[k]]),
            ),
          }, null, 2));
        ' 2>/dev/null || echo "(package.json unavailable)"

    - name: Build failure message
      if: ${{ failure() }}
      id: message-failure
      shell: bash
      env:
        RELEASE_TAG: ${{ inputs.release_tag }}
        LABEL: ${{ inputs.label }}
        STEP: publish
        SLACK_MENTION: ${{ inputs.failure_slack_mention }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        ACTOR_LINK: <${{ github.server_url }}/${{ github.actor }}|${{ github.actor }}>
      run: |
        # Subject is the package label when set, else the repository.
        SUBJECT="$GITHUB_REPOSITORY"
        [ -n "$LABEL" ] && SUBJECT="$LABEL"

        TEXT=":x: *$SUBJECT $RELEASE_TAG* failed at $STEP"
        TEXT="$TEXT\nInitiated by: $ACTOR_LINK"

        if [ -n "$SLACK_MENTION" ]; then
          TEXT="$TEXT  $SLACK_MENTION"
        fi

        TEXT="$TEXT\n<$RUN_URL|View failed run>"

        { echo 'text<<SLACK_DELIMITER'
          printf '%s\n' "$TEXT"
          echo 'SLACK_DELIMITER'
        } >> $GITHUB_OUTPUT

    - name: Send Slack message
      if: ${{ failure() }}
      shell: bash
      env:
        SLACK_BOT_TOKEN: ${{ inputs.slack_token }}
        SLACK_CHANNEL: ${{ inputs.slack_channel }}
        TEXT: ${{ steps.message-failure.outputs.text }}
        FAIL_ON_ERROR: 'false'
      run: |
        # Self-guard: no-op when Slack isn't configured, so callers needn't gate this step.
        if [ -z "$SLACK_BOT_TOKEN" ] || [ -z "$SLACK_CHANNEL" ]; then
          echo "Slack not configured; skipping notification."
          exit 0
        fi
        # jq --arg passes strings literally, so \n must be real newlines before encoding
        TEXT=$(printf '%b' "$TEXT")
        RESPONSE=$(curl -s --max-time 10 -X POST "https://slack.com/api/chat.postMessage" \
          -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
          -H "Content-Type: application/json; charset=utf-8" \
          -d "$(jq -n --arg channel "$SLACK_CHANNEL" --arg text "$TEXT" \
            '{channel: $channel, text: $text}')") || true
        if echo "$RESPONSE" | jq -e '.ok' > /dev/null 2>&1; then
          echo "Slack notification sent."
        elif [ "$FAIL_ON_ERROR" = "true" ]; then
          echo "::error title=Slack notification failed::$RESPONSE"
          exit 1
        else
          echo "::warning::Slack notification failed: $RESPONSE"
        fi
