# GENERATED by scripts/generate.rb — edit templates/, not this file.
name: Publish Python Package
description: >
  Full Python package release: checks out the SHA, sets up uv and Python,
  builds the sdist + wheel, generates and signs a CycloneDX SBOM (bound to the
  built dists), publishes to PyPI (OIDC Trusted Publishing with PEP 740
  attestations), creates a GitHub release (with the SBOM attached), and sends a
  Slack completion notification. Covers the standard publish sequence for
  Braintrust PyPI packages.

inputs:
  sha:
    description: "Commit SHA to check out and release"
    required: true
  checkout:
    description: "Check out the SHA before publishing. Set to false when the caller has already checked out and patched files."
    required: false
    default: 'true'
  working_directory:
    description: "Path to the package root (where pyproject.toml lives)"
    required: false
    default: '.'
  python_version:
    description: >
      Python version (e.g. 3.13), or a path to a version file
      (.python-version, .tool-versions) relative to the repo root.
    required: true
  build_command:
    description: "Override build command. When empty, `uv build` is used."
    required: false
    default: ''
  dry_run:
    description: "Skip PyPI upload, tag push, and GitHub release creation"
    required: false
    default: 'false'
  release_tag:
    description: "The release tag (e.g. py-0.3.2)"
    required: true
  version:
    description: "The package version — used to build the PyPI link in notifications"
    required: false
    default: ''
  github_release:
    description: "Whether to create a GitHub release"
    required: false
    default: 'true'
  release_title:
    description: "GitHub release name/title. Defaults to the release tag when empty."
    required: false
    default: ''
  pypi:
    description: "Whether to publish to PyPI"
    required: false
    default: 'true'
  attestations:
    description: "Whether to publish PEP 740 attestations (Sigstore-signed provenance). Requires id-token: write."
    required: false
    default: 'true'
  sbom:
    description: >
      Generate a CycloneDX SBOM, sign it (GitHub SBOM attestation bound to the
      published dist), and attach it to the GitHub release. Requires
      attestations: write on the job.
    required: false
    default: 'true'
  notes:
    description: "Base64-encoded release notes from the prepare action"
    required: false
    default: ''
  prev_release:
    description: "Previous release tag — used in completion notification"
    required: false
    default: ''
  branch:
    description: "Branch the release was made from"
    required: true
  on_release_branch:
    description: "Whether the SHA is on an expected release branch"
    required: true
  pr_list:
    description: "x1f-delimited PR list from prepare action"
    required: false
    default: ''
  package_name:
    description: "PyPI package name — used to build the PyPI link in notifications"
    required: false
    default: ''
  label:
    description: >
      Display name for release notifications (e.g. the package name). When set, it
      becomes the notification subject instead of the repository — useful when a repo
      publishes multiple packages. Defaults to the repository.
    required: false
    default: ''
  slack_token:
    description: "Slack bot token"
    required: false
    default: ''
  slack_channel:
    description: "Slack channel ID"
    required: false
    default: ''
  slack_mention:
    description: "Optional Slack handle or group to @mention on completion"
    required: false
    default: ''
  failure_slack_mention:
    description: "Optional Slack handle or group to @mention if the publish fails"
    required: false
    default: ''
  emoji:
    description: "Emoji prefix for Slack messages"
    required: false
    default: ':package:'

runs:
  using: composite
  steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      if: ${{ inputs.checkout == 'true' }}
      with:
        ref: ${{ inputs.sha }}
        fetch-depth: 0

    - name: Resolve Python version source
      id: py-src
      shell: bash
      env:
        PYTHON_VERSION: ${{ inputs.python_version }}
      run: |
        # python_version is either an explicit version (e.g. 3.13) or a path to a
        # version file (.python-version / .tool-versions). Route by file existence.
        if [ -n "$PYTHON_VERSION" ] && [ -f "$PYTHON_VERSION" ]; then
          case "$PYTHON_VERSION" in
            *.tool-versions) SPEC=$(awk '/^python /{print $2; exit}' "$PYTHON_VERSION") ;;
            *)               SPEC=$(head -1 "$PYTHON_VERSION" | tr -d '[:space:]') ;;
          esac
        else
          SPEC="$PYTHON_VERSION"
        fi
        echo "spec=$SPEC" >> "$GITHUB_OUTPUT"

    - name: Set up uv
      uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7.2.0
      with:
        # Installs this Python and exports UV_PYTHON for the job, so subsequent uv
        # commands (build, read-version) use it.
        python-version: ${{ steps.py-src.outputs.spec }}

    - name: Build distribution
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        BUILD_COMMAND: ${{ inputs.build_command }}
      run: |
        rm -rf dist
        if [ -n "$BUILD_COMMAND" ]; then
          echo "Running custom build: $BUILD_COMMAND"
          eval "$BUILD_COMMAND"
        else
          uv build
        fi
        uvx twine check dist/*

    - name: Generate SBOM (CycloneDX)
      if: ${{ inputs.sbom == 'true' }}
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        # cyclonedx-py can't read uv lockfiles, so scan the wheel's installed closure:
        # install the built wheel into a throwaway venv, then generate from that env.
        SBOM_VENV="$(mktemp -d)/venv"
        uv venv "$SBOM_VENV"
        uv pip install --python "$SBOM_VENV/bin/python" dist/*.whl
        uvx --from "cyclonedx-bom==7.3.0" cyclonedx-py environment "$SBOM_VENV" \
          --spec-version 1.7 --output-format JSON --output-file sbom.json
        echo "Wrote $(pwd)/sbom.json"

    - name: Attest SBOM
      if: ${{ inputs.sbom == 'true' && inputs.dry_run != 'true' }}
      uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
      with:
        subject-path: |-
          ${{ inputs.working_directory }}/dist/*.whl
          ${{ inputs.working_directory }}/dist/*.tar.gz
        sbom-path: ${{ inputs.working_directory }}/sbom.json

    - name: Publish to PyPI
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        PYPI_ENABLED: ${{ inputs.pypi }}
        DRY_RUN: ${{ inputs.dry_run }}
        ATTESTATIONS: ${{ inputs.attestations }}
      run: |
        if [ "$PYPI_ENABLED" != "true" ]; then
          echo "PyPI publishing disabled; skipping."
          exit 0
        fi
        if [ "$DRY_RUN" = "true" ]; then
          echo "DRY RUN: artifacts built and twine-checked; not uploaded to PyPI."
          exit 0
        fi
        # --trusted-publishing always: require OIDC (fail loudly rather than fall back
        # to token auth).
        ARGS=(--trusted-publishing always)
        if [ "$ATTESTATIONS" = "true" ]; then
          # uv uploads attestations but does not generate them; sign first (Sigstore,
          # ambient GitHub OIDC) so the *.publish.attestation files exist for upload.
          uvx pypi-attestations sign dist/*.whl dist/*.tar.gz
        else
          ARGS+=(--no-attestations)
        fi
        uv publish "${ARGS[@]}" || {
          echo "::error title=PyPI publish failed::auth/OIDC error → the PyPI trusted publisher must list this repo, workflow, and (if gated) environment; a 400 'File already exists' → the version is already on PyPI (bump it)."
          exit 1
        }

    - name: Create GitHub release
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        ENABLED: ${{ inputs.github_release }}
        DRY_RUN: ${{ inputs.dry_run }}
        TAG: ${{ inputs.release_tag }}
        RELEASE_TITLE: ${{ inputs.release_title }}
        NOTES_B64: ${{ inputs.notes }}
        SHA: ${{ inputs.sha }}
        SBOM_ENABLED: ${{ inputs.sbom }}
        WORKING_DIRECTORY: ${{ inputs.working_directory }}
      run: |
        if [ "$ENABLED" != "true" ]; then
          echo "GitHub release disabled; skipping."
          exit 0
        fi
        # Release name defaults to the tag when no explicit title is provided.
        TITLE="${RELEASE_TITLE:-$TAG}"
        if [ "$DRY_RUN" = "true" ]; then
          echo "DRY RUN: would create GitHub release $TAG (title: $TITLE)"
          echo "--- Release notes preview ---"
          echo "$NOTES_B64" | base64 -d 2>/dev/null || echo "(unavailable)"
        else
          echo "$NOTES_B64" | base64 -d 2>/dev/null > /tmp/release-notes.md
          gh release create "$TAG" \
            --title "$TITLE" \
            --notes-file /tmp/release-notes.md \
            --target "$SHA"
          # Attach the SBOM when one was generated for this release.
          if [ "$SBOM_ENABLED" = "true" ] && [ -f "$WORKING_DIRECTORY/sbom.json" ]; then
            gh release upload "$TAG" "$WORKING_DIRECTORY/sbom.json" --clobber
          fi
        fi

    - name: Build PyPI links
      id: links
      shell: bash
      env:
        PACKAGE_NAME: ${{ inputs.package_name }}
        VERSION: ${{ inputs.version }}
        DRY_RUN: ${{ inputs.dry_run }}
      run: |
        LINKS='[]'
        if [ "$DRY_RUN" != "true" ] && [ -n "$PACKAGE_NAME" ] && [ -n "$VERSION" ]; then
          LINKS="[{\"label\":\"PyPI\",\"url\":\"https://pypi.org/project/$PACKAGE_NAME/$VERSION/\"}]"
        fi
        echo "links=$LINKS" >> "$GITHUB_OUTPUT"

    - name: Post release summary
      shell: bash
      env:
        TAG: ${{ inputs.release_tag }}
        LABEL: ${{ inputs.label }}
        PREV_RELEASE: ${{ inputs.prev_release }}
        BRANCH: ${{ inputs.branch }}
        ON_RELEASE_BRANCH: ${{ inputs.on_release_branch }}
        DRY_RUN: ${{ inputs.dry_run }}
        LINKS_JSON: ${{ steps.links.outputs.links }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        RELEASE_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/releases/tag/$TAG"
        BRANCH_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/tree/$BRANCH"

        # Subject is the package label when set (disambiguates repos that publish
        # multiple packages); otherwise the repository. The repo is still present in
        # every link below, so it is never lost.
        SUBJECT="$GITHUB_REPOSITORY"
        [ -n "$LABEL" ] && SUBJECT="$LABEL"

        if [ "$DRY_RUN" = "true" ]; then
          echo "## $SUBJECT $TAG — dry run complete" >> $GITHUB_STEP_SUMMARY
        else
          echo "## $SUBJECT $TAG — published ✅" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY

        if [ "$DRY_RUN" = "true" ]; then
          echo "> [!NOTE]" >> $GITHUB_STEP_SUMMARY
          echo "> Dry run: Nothing was tagged or published." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
        fi

        if [ "$ON_RELEASE_BRANCH" = "false" ]; then
          echo "> [!WARNING]" >> $GITHUB_STEP_SUMMARY
          echo "> Released from non-release branch: [$BRANCH]($BRANCH_URL)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
        fi

        echo "**Branch:** [$BRANCH]($BRANCH_URL)" >> $GITHUB_STEP_SUMMARY

        if [ -n "$PREV_RELEASE" ]; then
          DIFF_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/compare/${PREV_RELEASE}...$TAG"
          echo "**Diff:** [$PREV_RELEASE...$TAG]($DIFF_URL)" >> $GITHUB_STEP_SUMMARY
        fi

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Published to" >> $GITHUB_STEP_SUMMARY

        if [ "$DRY_RUN" = "true" ]; then
          echo "- [View dry run]($RUN_URL)" >> $GITHUB_STEP_SUMMARY
        else
          echo "- [GitHub Release]($RELEASE_URL)" >> $GITHUB_STEP_SUMMARY
          if [ -n "$LINKS_JSON" ] && [ "$LINKS_JSON" != "[]" ]; then
            echo "$LINKS_JSON" | jq -r '.[] | "- [\(.label)](\(.url))"' >> $GITHUB_STEP_SUMMARY
          fi
        fi

    - name: Build published message
      id: message-published
      shell: bash
      env:
        TAG: ${{ inputs.release_tag }}
        LABEL: ${{ inputs.label }}
        EMOJI: ${{ inputs.emoji }}
        BRANCH: ${{ inputs.branch }}
        ON_RELEASE_BRANCH: ${{ inputs.on_release_branch }}
        PREV_RELEASE: ${{ inputs.prev_release }}
        DRY_RUN: ${{ inputs.dry_run }}
        SLACK_MENTION: ${{ inputs.slack_mention }}
        LINKS_JSON: ${{ steps.links.outputs.links }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        PR_LIST_RAW: ${{ inputs.pr_list }}
      run: |
        RELEASE_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/releases/tag/$TAG"

        # Subject is the package label when set, else the repository (see summary step).
        SUBJECT="$GITHUB_REPOSITORY"
        [ -n "$LABEL" ] && SUBJECT="$LABEL"

        DIFF_PART=""
        if [ -n "$PREV_RELEASE" ]; then
          DIFF_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/compare/${PREV_RELEASE}...$TAG"
          DIFF_PART="<$DIFF_URL|${PREV_RELEASE}...$TAG>  ·  "
        fi

        PR_LIST=$(echo "$PR_LIST_RAW" | tr $'\x1f' '\n' | sed '/^$/d')

        if [ "$DRY_RUN" = "true" ]; then
          TEXT="$EMOJI *$SUBJECT $TAG* complete"
          TEXT="$TEXT\n> :information_source: _Dry run: nothing tagged or published._"
        else
          TEXT="$EMOJI *$SUBJECT $TAG* published"
        fi

        if [ "$ON_RELEASE_BRANCH" = "false" ]; then
          BRANCH_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/tree/$BRANCH"
          TEXT="$TEXT\n> ⚠️ NOT on release branch: <$BRANCH_URL|$BRANCH>"
        fi

        if [ "$DRY_RUN" = "true" ]; then
          TEXT="$TEXT\n${DIFF_PART}<$RUN_URL|View dry run>"
        else
          SLACK_LINKS="${DIFF_PART}<$RELEASE_URL|View release>"
          if [ -n "$LINKS_JSON" ] && [ "$LINKS_JSON" != "[]" ]; then
            EXTRA=$(echo "$LINKS_JSON" | jq -r '[.[] | "<\(.url)|\(.label)>"] | join("  ·  ")')
            SLACK_LINKS="$SLACK_LINKS  ·  $EXTRA"
          fi
          TEXT="$TEXT\n$SLACK_LINKS"
        fi

        if [ -n "$PR_LIST" ]; then
          TEXT="$TEXT\n$PR_LIST"
        fi

        if [ -n "$SLACK_MENTION" ]; then
          TEXT="$TEXT\n$SLACK_MENTION"
        fi

        { echo 'text<<SLACK_DELIMITER'
          printf '%s\n' "$TEXT"
          echo 'SLACK_DELIMITER'
        } >> $GITHUB_OUTPUT

    - name: Send Slack message
      shell: bash
      env:
        SLACK_BOT_TOKEN: ${{ inputs.slack_token }}
        SLACK_CHANNEL: ${{ inputs.slack_channel }}
        TEXT: ${{ steps.message-published.outputs.text }}
        FAIL_ON_ERROR: 'false'
      run: |
        # Self-guard: no-op when Slack isn't configured, so callers needn't gate this step.
        if [ -z "$SLACK_BOT_TOKEN" ] || [ -z "$SLACK_CHANNEL" ]; then
          echo "Slack not configured; skipping notification."
          exit 0
        fi
        # jq --arg passes strings literally, so \n must be real newlines before encoding
        TEXT=$(printf '%b' "$TEXT")
        RESPONSE=$(curl -s --max-time 10 -X POST "https://slack.com/api/chat.postMessage" \
          -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
          -H "Content-Type: application/json; charset=utf-8" \
          -d "$(jq -n --arg channel "$SLACK_CHANNEL" --arg text "$TEXT" \
            '{channel: $channel, text: $text}')") || true
        if echo "$RESPONSE" | jq -e '.ok' > /dev/null 2>&1; then
          echo "Slack notification sent."
        elif [ "$FAIL_ON_ERROR" = "true" ]; then
          echo "::error title=Slack notification failed::$RESPONSE"
          exit 1
        else
          echo "::warning::Slack notification failed: $RESPONSE"
        fi

    - name: Dump Python environment
      if: ${{ failure() }}
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        echo "=== uv / Python ==="
        uv --version || echo "(uv unavailable)"
        uv run --no-project python --version || echo "(python unavailable)"
        echo "=== UV_PYTHON ==="
        echo "${UV_PYTHON:-(unset)}"
        echo "=== Built artifacts ==="
        ls -la dist 2>/dev/null || echo "(no dist/)"
        echo "=== pyproject.toml (release-relevant) ==="
        uv run --no-project python -c '
        import json, tomllib, pathlib
        t = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
        proj = t.get("project", {})
        print(json.dumps({
            "name": proj.get("name"),
            "version": proj.get("version") or ("(dynamic)" if "version" in proj.get("dynamic", []) else None),
            "requires-python": proj.get("requires-python"),
            "dependencies": proj.get("dependencies"),
            "optional-dependencies": sorted((proj.get("optional-dependencies") or {}).keys()),
            "build-system": t.get("build-system"),
        }, indent=2))
        ' 2>/dev/null || echo "(pyproject.toml unavailable)"

    - name: Build failure message
      if: ${{ failure() }}
      id: message-failure
      shell: bash
      env:
        RELEASE_TAG: ${{ inputs.release_tag }}
        LABEL: ${{ inputs.label }}
        STEP: publish
        SLACK_MENTION: ${{ inputs.failure_slack_mention }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        ACTOR_LINK: <${{ github.server_url }}/${{ github.actor }}|${{ github.actor }}>
      run: |
        # Subject is the package label when set, else the repository.
        SUBJECT="$GITHUB_REPOSITORY"
        [ -n "$LABEL" ] && SUBJECT="$LABEL"

        TEXT=":x: *$SUBJECT $RELEASE_TAG* failed at $STEP"
        TEXT="$TEXT\nInitiated by: $ACTOR_LINK"

        if [ -n "$SLACK_MENTION" ]; then
          TEXT="$TEXT  $SLACK_MENTION"
        fi

        TEXT="$TEXT\n<$RUN_URL|View failed run>"

        { echo 'text<<SLACK_DELIMITER'
          printf '%s\n' "$TEXT"
          echo 'SLACK_DELIMITER'
        } >> $GITHUB_OUTPUT

    - name: Send Slack message
      if: ${{ failure() }}
      shell: bash
      env:
        SLACK_BOT_TOKEN: ${{ inputs.slack_token }}
        SLACK_CHANNEL: ${{ inputs.slack_channel }}
        TEXT: ${{ steps.message-failure.outputs.text }}
        FAIL_ON_ERROR: 'false'
      run: |
        # Self-guard: no-op when Slack isn't configured, so callers needn't gate this step.
        if [ -z "$SLACK_BOT_TOKEN" ] || [ -z "$SLACK_CHANNEL" ]; then
          echo "Slack not configured; skipping notification."
          exit 0
        fi
        # jq --arg passes strings literally, so \n must be real newlines before encoding
        TEXT=$(printf '%b' "$TEXT")
        RESPONSE=$(curl -s --max-time 10 -X POST "https://slack.com/api/chat.postMessage" \
          -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
          -H "Content-Type: application/json; charset=utf-8" \
          -d "$(jq -n --arg channel "$SLACK_CHANNEL" --arg text "$TEXT" \
            '{channel: $channel, text: $text}')") || true
        if echo "$RESPONSE" | jq -e '.ok' > /dev/null 2>&1; then
          echo "Slack notification sent."
        elif [ "$FAIL_ON_ERROR" = "true" ]; then
          echo "::error title=Slack notification failed::$RESPONSE"
          exit 1
        else
          echo "::warning::Slack notification failed: $RESPONSE"
        fi
