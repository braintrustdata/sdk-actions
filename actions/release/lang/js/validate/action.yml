# GENERATED by scripts/generate.rb — edit templates/, not this file.
name: Validate JavaScript Release
description: >
  Checks out the release SHA, sets up Node and the package manager, reads the
  package version, validates the release channel and metadata (tag existence,
  branch, commit metadata), and builds to confirm the package is publishable
  before the approval gate.

inputs:
  sha:
    description: "Commit SHA being released"
    required: true
  dry_run:
    description: "Skip tag existence failure in dry runs"
    required: false
    default: 'false'
  version:
    description: >
      Explicit version override. If provided, the version is not read from
      package.json. Use when the version is computed externally (e.g. bt-publishing-test
      auto-bump from run number).
    required: false
    default: ''
  working_directory:
    description: "Path to the package root (where package.json lives)"
    required: false
    default: '.'
  package_manager:
    description: "Package manager: pnpm | npm | yarn"
    required: false
    default: 'pnpm'
  node_version:
    description: "Node version to use"
    required: false
    default: '22'
  pnpm_version:
    description: "pnpm version to install (when package_manager is pnpm)"
    required: false
    default: '10.33.0'
  registry:
    description: "npm registry URL"
    required: false
    default: 'https://registry.npmjs.org'
  tag_format:
    description: "Git tag format, with a {version} placeholder (e.g. js-{version})"
    required: false
    default: 'v{version}'
  channel:
    description: "npm release channel (dist-tag) this release targets"
    required: false
    default: 'latest'
  allowed_channels:
    description: "Comma-separated allowlist of accepted release channels"
    required: false
    default: 'latest'
  build_command:
    description: "npm script to run for the build"
    required: false
    default: 'build'
outputs:
  release_tag:
    description: "The release tag (e.g. v0.3.2)"
    value: ${{ steps.validate.outputs.release_tag }}
  prev_release:
    description: "The previous release tag"
    value: ${{ steps.validate.outputs.prev_release }}
  branch:
    description: "The branch containing the SHA"
    value: ${{ steps.validate.outputs.branch }}
  on_release_branch:
    description: "Whether the SHA is on an expected release branch"
    value: ${{ steps.validate.outputs.on_release_branch }}
  commit_message:
    description: "The commit message at the SHA"
    value: ${{ steps.validate.outputs.commit_message }}
  version:
    description: "The resolved package version"
    value: ${{ steps.read-version.outputs.version }}

runs:
  using: composite
  steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ inputs.sha }}
        fetch-depth: 0

    - name: Set up pnpm
      if: ${{ inputs.package_manager == 'pnpm' }}
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      with:
        version: ${{ inputs.pnpm_version }}

    - name: Set up Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node_version }}
        registry-url: ${{ inputs.registry }}
        cache: ${{ inputs.package_manager }}
        cache-dependency-path: |
          ${{ inputs.working_directory }}/pnpm-lock.yaml
          ${{ inputs.working_directory }}/package-lock.json
          ${{ inputs.working_directory }}/yarn.lock

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        PM: ${{ inputs.package_manager }}
      run: |
        case "$PM" in
          pnpm) pnpm install --frozen-lockfile ;;
          yarn) yarn install --frozen-lockfile ;;
          npm)  npm ci ;;
          *) echo "Unknown package_manager: $PM"; exit 1 ;;
        esac

    - name: Read version
      id: read-version
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        VERSION_OVERRIDE: ${{ inputs.version }}
      run: |
        if [ -n "$VERSION_OVERRIDE" ]; then
          echo "version=$VERSION_OVERRIDE" >> $GITHUB_OUTPUT
        else
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        fi

    - name: Validate release channel
      shell: bash
      env:
        CHANNEL: ${{ inputs.channel }}
        ALLOWED: ${{ inputs.allowed_channels }}
      run: |
        IFS=',' read -ra OK <<< "$ALLOWED"
        for c in "${OK[@]}"; do
          [ "$(echo "$c" | xargs)" = "$CHANNEL" ] && exit 0
        done
        echo "Error: release channel '$CHANNEL' is not in the allowed set: $ALLOWED"
        exit 1

    - name: Validate SHA format
      shell: bash
      env:
        SHA: ${{ inputs.sha }}
      run: |
        if ! echo "$SHA" | grep -qE '^[0-9a-f]{40}$'; then
          echo "Error: sha must be a full 40-character commit SHA — branch names and short SHAs are not accepted."
          exit 1
        fi

    - name: Validate release
      id: validate
      shell: bash
      env:
        VERSION: ${{ steps.read-version.outputs.version }}
        TAG_FORMAT: ${{ inputs.tag_format }}
        DRY_RUN: ${{ inputs.dry_run }}
        RELEASE_BRANCH: 'main'
        SHA: ${{ inputs.sha }}
      run: |
        TAG="${TAG_FORMAT//\{version\}/$VERSION}"
        COMMIT_MSG=$(git log -1 --format="%s" HEAD)
        BRANCH=$(git branch -r --contains HEAD --format="%(refname:short)" | sed 's|origin/||' | head -1)

        if git rev-parse "$TAG" >/dev/null 2>&1; then
          if [ "$DRY_RUN" = "true" ]; then
            echo "Warning: Tag $TAG already exists — skipping in dry run"
          else
            echo "Error: Tag $TAG already exists — has the version been bumped?"
            exit 1
          fi
        fi

        ON_RELEASE_BRANCH=false
        IFS=',' read -ra PATTERNS <<< "$RELEASE_BRANCH"
        for pattern in "${PATTERNS[@]}"; do
          pattern=$(echo "$pattern" | xargs)
          if [[ "$BRANCH" == $pattern ]]; then
            ON_RELEASE_BRANCH=true
            break
          fi
        done

        PREV_RELEASE_PATTERN="${TAG_FORMAT//\{version\}/[0-9]*.[0-9]*.[0-9]*}"
        PREV_RELEASE=$(git describe --tags --abbrev=0 --match="$PREV_RELEASE_PATTERN" HEAD^ 2>/dev/null || echo "")

        echo "release_tag=$TAG" >> $GITHUB_OUTPUT
        echo "commit_message=$COMMIT_MSG" >> $GITHUB_OUTPUT
        echo "branch=$BRANCH" >> $GITHUB_OUTPUT
        echo "on_release_branch=$ON_RELEASE_BRANCH" >> $GITHUB_OUTPUT
        echo "prev_release=$PREV_RELEASE" >> $GITHUB_OUTPUT
        echo "Validated $TAG @ $SHA ($COMMIT_MSG)"

    - name: Build
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        PM: ${{ inputs.package_manager }}
        BUILD_COMMAND: ${{ inputs.build_command }}
      run: |
        "$PM" run "$BUILD_COMMAND"

    - name: Dump JavaScript environment
      if: ${{ failure() }}
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        PM: ${{ inputs.package_manager }}
      run: |
        echo "=== Node environment ==="
        node --version
        npm --version
        echo "=== Package manager ($PM) ==="
        "$PM" --version || echo "(unavailable)"
        echo "=== Registry ==="
        npm config get registry
        echo "=== package.json version ==="
        node -p "require('./package.json').version" 2>/dev/null || echo "(unavailable)"
